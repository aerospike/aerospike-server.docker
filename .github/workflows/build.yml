name: Docker Build
permissions:
  contents: read
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  generate-check:
    name: Generate (no diff)
    runs-on: ubuntu-24.04
    outputs:
      lineages: ${{ steps.discover.outputs.list }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Discover lineages under releases/
        id: discover
        run: |
          found=()
          for d in releases/*/; do
            [ -d "${d}" ] || continue
            b=$(basename "${d}")
            [[ "${b}" =~ ^[0-9]+\.[0-9]+$ ]] || continue
            found+=("${b}")
          done
          if [ ${#found[@]} -eq 0 ]; then
            echo "No releases/X.Y directories found under releases/" >&2
            exit 1
          fi
          list=$(printf '%s\n' "${found[@]}" | sort -V | paste -sd' ' -)
          echo "Discovered lineages: ${list}"
          echo "list=${list}" >> "${GITHUB_OUTPUT}"
      - name: Generate Dockerfiles for lineages in releases/
        run: |
          for lineage in ${{ steps.discover.outputs.list }}; do
            ./docker-build.sh -g "${lineage}"
          done
      - name: Should not change anything
        continue-on-error: true
        run: '[ -z "$(git diff --stat)" ] || (git diff --stat; exit 1)'

  build-and-test:
    name: Build and test
    needs: generate-check
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/checkout@v4
      - name: Build images for lineages in releases/
        run: |
          for lineage in ${{ needs.generate-check.outputs.lineages }}; do
            ./docker-build.sh -t "${lineage}"
          done
      # Each `docker-build.sh -t <lineage>` wipes releases/ and regenerates only that lineage,
      # so after the loop only the last lineage remains on disk. test.sh needs every
      # releases/X.Y/... tree to exist when it maps tags to Dockerfiles.
      - name: Regenerate full releases/ tree for test.sh
        run: ./docker-build.sh -g
      - name: Test images for lineages in releases/
        run: |
          for lineage in ${{ needs.generate-check.outputs.lineages }}; do
            ./test.sh "${lineage}" -a amd64 -a arm64
          done
