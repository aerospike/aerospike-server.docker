      - name: Snyk container scan
        if: always() && steps.*.outcome == 'success'
        continue-on-error: true
        run: |
          for df in releases/8.1/*/ubuntu24.04/Dockerfile; do
            [ -f "${df}" ] || continue
            edition=$(echo "${df}" | cut -d/ -f3)
            image="aerospike/aerospike-server"
            [ "${edition}" != "community" ] && image+="-${edition}"
            tag=$(grep -oP 'image\.version="\K[^"]+' "${df}" || true)
            [ -z "${tag}" ] && continue
            full="${image}:${tag}-amd64"
            docker image inspect "${full}" >/dev/null 2>&1 || continue
            echo "::group::Snyk scan ${edition} (ubuntu24.04 amd64)"
            snyk container test "${full}" --platform=linux/amd64 --file="${df}" || true
            echo "::endgroup::"
          done

  build-and-test-ubi:
    name: Build and test 8.1 (ubi9)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/checkout@v4
      - name: Build
        run: ./docker-build.sh -t 8.1 -d ubi9 -a amd64
      - name: Test
        run: ./test.sh 8.1 -d ubi9 -a amd64
      - name: Snyk container scan
        if: always() && steps.*.outcome == 'success'
        continue-on-error: true
        run: |
          for df in releases/8.1/*/ubi9/Dockerfile; do
            [ -f "${df}" ] || continue
            edition=$(echo "${df}" | cut -d/ -f3)
            image="aerospike/aerospike-server"
            [ "${edition}" != "community" ] && image+="-${edition}"
            tag=$(grep -oP 'image\.version="\K[^"]+' "${df}" || true)
            [ -z "${tag}" ] && continue
            full="${image}:${tag}-amd64"
            docker image inspect "${full}" >/dev/null 2>&1 || continue
            echo "::group::Snyk scan ${edition} (ubi9 amd64)"
            snyk container test "${full}" --platform=linux/amd64 --file="${df}" || true
            echo "::endgroup::"
          done

