name: Docker Build
permissions:
  contents: read
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  generate-check:
    name: Generate (no diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Dockerfiles for 8.1
        run: ./docker-build.sh -g 8.1
      - name: Should not change anything
        run: '[ -z "$(git diff --stat)" ] || (git diff --stat; exit 1)'

  build-and-test:
    name: Build and test 8.1
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: actions/checkout@v4
      - name: Build
        run: ./docker-build.sh -t 8.1
      - name: Test
        run: ./test.sh 8.1
